# Default configuration for mrm handler
# 10.17_YSH_mrm_timeouts_relaxed_for_carla
---
/**:
  ros__parameters:
    update_rate: 10
    # Before: timeout_operation_mode_availability: 0.5
    # Increased for CARLA initialization time
    timeout_operation_mode_availability: 10.0
    # Before: timeout_call_mrm_behavior: 0.01
    timeout_call_mrm_behavior: 1.0
    # Before: timeout_cancel_mrm_behavior: 0.01
    timeout_cancel_mrm_behavior: 1.0
    use_emergency_holding: false
    # Before: timeout_emergency_recovery: 5.0
    # Increased for CARLA route setup time
    timeout_emergency_recovery: 30.0
    use_parking_after_stopped: false
    use_pull_over: false
    use_comfortable_stop: false

    # setting whether to turn hazard lamp on for each situation
    turning_hazard_on:
      emergency: true

    turning_indicator_on:
      emergency: true
